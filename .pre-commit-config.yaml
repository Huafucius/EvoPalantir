repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-json
      - id: check-toml
      - id: check-yaml
  - repo: local
    hooks:
      - id: repo-format-check
        name: repo-format-check
        entry: pnpm format:check
        language: system
        pass_filenames: false
      - id: repo-lint
        name: repo-lint
        entry: pnpm lint
        language: system
        pass_filenames: false
      - id: agentos-quality
        name: agentos-quality
        entry: pixi run --manifest-path AgentOS/pyproject.toml quality
        language: system
        pass_filenames: false
