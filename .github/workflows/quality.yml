name: quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  commit-message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint pushed commit messages
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            pnpm exec commitlint --last --verbose
          else
            pnpm exec commitlint --from "${{ github.event.before }}" --to "${{ github.sha }}" --verbose
          fi

      - name: Lint pull request commit messages
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

  typescript-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build web app
        run: pnpm --filter web build

  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.8
        with:
          manifest-path: AgentOS/pyproject.toml

      - name: Run AgentOS quality checks
        run: pixi run --manifest-path AgentOS/pyproject.toml quality
